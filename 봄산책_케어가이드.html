<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>봄 산책 케어가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1a10;background-image:radial-gradient(ellipse at 30% 50%,#0a1e0d,transparent 60%),radial-gradient(ellipse at 70% 50%,#050f06,transparent 60%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif KR',Georgia,serif;padding:20px;user-select:none}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.book-outer{position:relative;width:720px;height:520px}
.book-shadow{position:absolute;bottom:-18px;left:15%;width:70%;height:30px;background:rgba(0,0,0,.5);filter:blur(18px);border-radius:50%}
.page{width:720px;height:520px;background:#fdf6e3;border-radius:3px 10px 10px 3px;box-shadow:-3px 0 6px rgba(0,0,0,.2),8px 8px 24px rgba(0,0,0,.5),18px 18px 40px rgba(0,0,0,.3),inset -4px 0 12px rgba(0,0,0,.06);overflow:hidden;position:relative;transform-origin:left center}
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,rgba(0,0,0,.18) 0%,rgba(0,0,0,.06) 50%,transparent 100%);z-index:20;pointer-events:none}
.page::after{content:'';position:absolute;right:0;top:0;bottom:0;width:16px;background:linear-gradient(to left,rgba(0,0,0,.07),transparent);z-index:20;pointer-events:none}
.pc{padding:44px 60px 44px 72px;height:100%;overflow-y:auto;scrollbar-width:none}
.pc::-webkit-scrollbar{display:none}
.pc.full{padding:0}
@keyframes fOut{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}}
@keyframes fIn{0%{transform:perspective(1400px) rotateY(18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
@keyframes fOutL{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(18deg);opacity:.4}}
@keyframes fInL{0%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
.fo{animation:fOut .28s ease forwards}.fi{animation:fIn .28s ease forwards}.fol{animation:fOutL .28s ease forwards}.fil{animation:fInL .28s ease forwards}
.pnum{position:absolute;bottom:16px;right:26px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#2e7d32;z-index:30}
.prog{width:720px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(to right,#1b5e20,#66bb6a);border-radius:2px;transition:width .4s ease}
.pcnt{color:rgba(255,255,255,.5);font-family:'Noto Sans KR',sans-serif;font-size:12px;min-width:70px;text-align:center}
.hint{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.22);text-align:center}
/* 공통 */
.cover{background:linear-gradient(150deg,#051208 0%,#0d2e10 45%,#051208 100%);color:#e8f5e9;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;padding:44px 36px}
.cover-line{width:48px;height:1px;background:#66bb6a;margin:14px auto}
.stitle{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-bottom:9px;border-bottom:2px solid}
.stitle.sp{border-bottom-color:#a5d6a7}
.stitle.dash{border-bottom-color:#80cbc4}
.stitle.yorkie{border-bottom-color:#ce93d8}
.stitle.beagle{border-bottom-color:#90caf9}
.stitle.malti{border-bottom-color:#a5d6a7}
.stitle.faq{border-bottom-color:#ffcc80}
.bt{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#3a3a3a;line-height:2;margin-bottom:10px}
/* 하이라이트 박스 */
.hb{border-left:4px solid;padding:12px 16px;margin:10px 0;border-radius:0 8px 8px 0}
.hb.sp{background:#f1f8f1;border-color:#2e7d32}.hb.sp p{color:#1b4f1e}
.hb.dash{background:#e0f2f1;border-color:#00695c}.hb.dash p{color:#003d33}
.hb.yorkie{background:#f3e5f5;border-color:#6a1b9a}.hb.yorkie p{color:#3d0070}
.hb.beagle{background:#e3f2fd;border-color:#1565c0}.hb.beagle p{color:#0d2a55}
.hb.malti{background:#f1f8f1;border-color:#2e7d32}.hb.malti p{color:#1b4f1e}
.hb.orange{background:#fff3e0;border-color:#e65100}.hb.orange p{color:#bf360c}
.hb p{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;line-height:1.9;font-weight:500;margin:0}
/* 키 포인트 박스 */
.kp{border:1px solid;border-radius:8px;padding:12px 16px;margin:10px 0}
.kp.sp{background:#f1f8f1;border-color:#a5d6a7}
.kp.dash{background:#e0f2f1;border-color:#80cbc4}
.kp.yorkie{background:#f3e5f5;border-color:#ce93d8}
.kp.beagle{background:#e3f2fd;border-color:#90caf9}
.kp.malti{background:#f1f8f1;border-color:#a5d6a7}
.kp.faq{background:#fff8e1;border-color:#ffcc80}
.kp.orange{background:#fff3e0;border-color:#ffab40}
.kpt{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.kpt.sp{color:#2e7d32}.kpt.dash{color:#00695c}.kpt.yorkie{color:#6a1b9a}.kpt.beagle{color:#1565c0}.kpt.malti{color:#2e7d32}.kpt.faq{color:#e65100}.kpt.orange{color:#e65100}
.kp p{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;color:#1a1a1a;line-height:1.85}
/* 페르소나 헤더 */
.persona-hd{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;margin-bottom:12px;border:1px solid}
.persona-hd.dash{background:linear-gradient(135deg,#e0f2f1,#e8f5e9);border-color:#80cbc4}
.persona-hd.yorkie{background:linear-gradient(135deg,#f3e5f5,#fdf6e3);border-color:#ce93d8}
.persona-hd.beagle{background:linear-gradient(135deg,#e3f2fd,#e8f4fd);border-color:#90caf9}
.persona-hd.malti{background:linear-gradient(135deg,#e8f5e9,#f1f8f1);border-color:#a5d6a7}
.persona-icon{font-size:28px;flex-shrink:0}
.persona-name{font-size:18px;font-weight:700;color:#1a1a1a}
.persona-info{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#666;margin-top:3px;line-height:1.7}
.persona-target{font-family:'Noto Sans KR',sans-serif;font-size:10.5px;font-weight:700;margin-top:5px}
.persona-target.dash{color:#00695c}.persona-target.yorkie{color:#6a1b9a}.persona-target.beagle{color:#1565c0}.persona-target.malti{color:#2e7d32}
/* 신호 행 */
.sig-row{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-bottom:1px solid #efefef;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:1.5}
.sig-b{flex:0 0 8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.sig-b.r{background:#c0392b}.sig-b.o{background:#e67e22}.sig-b.y{background:#f1c40f}
.sig-txt{flex:1}
.sig-mean{color:#888;font-size:11px;margin-top:1px}
.sig-current{color:#c0392b;font-size:10px;font-weight:700}
/* 케이스 박스 */
.case-box{border-radius:8px;padding:14px 16px;margin:10px 0;border:1px solid}
.case-box.dash{background:#e0f2f1;border-color:#80cbc4}
.case-box.yorkie{background:#f3e5f5;border-color:#ce93d8}
.case-box.beagle{background:#e3f2fd;border-color:#90caf9}
.case-box.malti{background:#f1f8f1;border-color:#a5d6a7}
.case-box.orange{background:#fff3e0;border-color:#ffab40}
.case-title{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;margin-bottom:8px}
.case-title.dash{color:#00695c}.case-title.yorkie{color:#6a1b9a}.case-title.beagle{color:#1565c0}.case-title.malti{color:#2e7d32}.case-title.orange{color:#e65100}
.case-body{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:1.9}
.case-check{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:2;margin:6px 0}
.quote{font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-style:italic;color:#555;line-height:1.9;margin-top:8px;padding-top:8px;border-top:1px dashed #ccc}
/* 테이블 */
table.ct{width:100%;border-collapse:collapse;margin:8px 0;font-family:'Noto Sans KR',sans-serif;font-size:12px}
table.ct th{color:#fff;padding:7px 10px;text-align:left;font-weight:600}
table.ct.dash th{background:#00695c}
table.ct.yorkie th{background:#6a1b9a}
table.ct.beagle th{background:#1565c0}
table.ct.malti th{background:#2e7d32}
table.ct.sp th{background:#2e7d32}
table.ct.faq th{background:#e65100}
table.ct td{padding:7px 10px;border-bottom:1px solid #e0e0e0;color:#3a3a3a;line-height:1.5;font-size:11.5px}
table.ct.dash tr:nth-child(even) td{background:#e0f2f1}
table.ct.yorkie tr:nth-child(even) td{background:#f3e5f5}
table.ct.beagle tr:nth-child(even) td{background:#e3f2fd}
table.ct.malti tr:nth-child(even) td{background:#f1f8f1}
table.ct.sp tr:nth-child(even) td{background:#f1f8f1}
table.ct.faq tr:nth-child(even) td{background:#fff8e1}
/* 엔딩 */
.ep{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;color:#fff;padding:56px;background:linear-gradient(140deg,#051208,#0d2e10)}
.ep h2{font-size:24px;line-height:1.6;margin-bottom:16px}
.ep p{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:rgba(255,255,255,.75);line-height:2.1}
.ep-line{width:50px;height:2px;background:#66bb6a;margin:16px auto}
/* 목차 */
.toc-i{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #e0e8f0;cursor:pointer}
.toc-i:hover{background:#f0f5fd;border-radius:6px}
.toc-cn{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;width:36px;flex-shrink:0}
.toc-cn.dash{color:#00695c}.toc-cn.yorkie{color:#6a1b9a}.toc-cn.beagle{color:#1565c0}.toc-cn.malti{color:#2e7d32}.toc-cn.faq{color:#e65100}
.toc-t{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#2a2a2a;flex:1}
.toc-sub{padding:3px 8px 3px 20px;font-size:11.5px;color:#555;border-left:2px solid #d0dce8;margin:1px 0 1px 14px;cursor:pointer;border-radius:0 5px 5px 0;transition:background .15s}
.toc-sub:hover{background:#f0f5fd}
/* Q&A */
.qa-box{border-radius:8px;padding:12px 16px;margin:8px 0;background:#fff8e1;border:1px solid #ffcc80}
.qa-q{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;font-weight:700;color:#e65100;margin-bottom:6px}
.qa-a{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:1.9}
/* 사이드 버튼 */
.side-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:40;width:52px;height:80px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.65);font-size:28px;cursor:pointer;transition:all .2s;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:sans-serif}
.side-btn:hover:not(:disabled){background:rgba(255,255,255,.22);color:#fff;transform:translateY(-50%) scale(1.07)}
.side-btn:disabled{opacity:.15;cursor:not-allowed;transform:translateY(-50%)}
.side-prev{left:-62px;border-radius:10px 0 0 10px}
.side-next{right:-62px;border-radius:0 10px 10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="book-outer">
    <div class="book-shadow"></div>
    <button class="side-btn side-prev" id="pb" onclick="prev()">‹</button>
    <button class="side-btn side-next" id="nb" onclick="next()">›</button>
    <div class="page" id="page"><div class="pc" id="pc"></div><div class="pnum" id="pnum"></div></div>
  </div>
  <div class="prog"><div class="pfill" id="pfill"></div></div>
  <span class="pcnt" id="pcnt"></span>
  <div class="hint">← → 키 · 양옆 버튼 · 스와이프로 넘기세요</div>
</div>
<script>
const pages=[

/* ━━━ 0. 표지 ━━━ */
`<div class="cover">
  <p style="font-size:11px;color:#66bb6a;letter-spacing:3px;font-weight:700;margin-bottom:16px">🏥 하나로양한방동물병원</p>
  <div style="background:rgba(102,187,106,.12);border:1px solid rgba(102,187,106,.3);border-radius:12px;padding:14px 22px;margin-bottom:20px">
    <p style="font-size:13px;line-height:2;color:#c8e6c9;margin:0;font-style:italic">"강아지는 말을 못 합니다.<br>대신 몸으로 말합니다."</p>
  </div>
  <div style="font-size:11px;color:#66bb6a;letter-spacing:2px;font-weight:700;margin-bottom:8px">🌸 2026봄 — 수의사 긴급 가이드</div>
  <h1 style="font-size:28px;font-weight:800;line-height:1.5;color:#fff;margin-bottom:6px">우리 강아지 몸이<br>보내는 신호</h1>
  <div class="cover-line"></div>
  <p style="font-size:12px;color:#a5d6a7;line-height:2.1;margin-bottom:20px">봄 산책 후 갑자기 보이는 그 행동의 진짜 의미<br>견종별·페르소나별 맞춤 진단 &amp; 케어 가이드</p>
  <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
    <div style="text-align:center"><div style="font-size:16px">🐾</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#4a7a50;margin-top:3px">멜리·조이·볼트<br>닥스훈트</div></div>
    <div style="text-align:center"><div style="font-size:16px">🐾</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#4a7a50;margin-top:3px">딱지<br>요크셔테리어</div></div>
    <div style="text-align:center"><div style="font-size:16px">🐾</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#4a7a50;margin-top:3px">제이<br>비글</div></div>
    <div style="text-align:center"><div style="font-size:16px">🐾</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#4a7a50;margin-top:3px">봄이<br>말티즈</div></div>
  </div>
</div>`,

/* ━━━ 1. 왜 봄인가 ━━━ */
`<div class="stitle sp">🌸 왜 하필 봄인가 — 봄철 근골격 위기의 원리</div>
<div class="hb sp"><p>겨우내 약해진 근육이 갑작스러운 운동 부하를 버티지 못하는 것.<br>저는 이것을 <strong>'봄철 근골격 충격'</strong>이라고 부릅니다.</p></div>
<p class="bt">겨울 동안 실내에서 지내던 강아지의 근육은 조용히 약해집니다. 봄이 되면 보호자도 신나고, 강아지도 신납니다. 갑자기 산책이 길어지고, 공원을 뛰어다닙니다. 그리고 — 다음 날 아침, 무언가가 달라져 있습니다.</p>
<p class="bt">이 시기에 보호자가 어떻게 반응하느냐에 따라, 2~4주 후의 결과가 완전히 달라집니다.</p>
<div class="kp sp">
  <div class="kpt sp">강아지가 보내는 신호를 놓치는 이유</div>
  <p>신호가 없어서가 아닙니다. <strong>신호를 읽는 법을 몰라서입니다.</strong><br>견종마다 통증을 표현하는 방식이 다르고, 나이마다 보내는 신호가 다릅니다.<br>이 가이드는 각 페르소나의 아이들이 보내는 신호를 정확히 읽어드립니다.</p>
</div>
<div style="display:flex;gap:10px;margin-top:10px">
  <div style="flex:1;background:#f1f8f1;border-radius:8px;padding:10px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#2e7d32;font-weight:700">치료 케이스<br>5,000건+</div>
  <div style="flex:1;background:#f1f8f1;border-radius:8px;padding:10px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#2e7d32;font-weight:700">16년<br>통합의학</div>
  <div style="flex:1;background:#f1f8f1;border-radius:8px;padding:10px;text-align:center;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#2e7d32;font-weight:700">김포 유일<br>양·한방 병행</div>
</div>`,

/* ━━━ 2. 보편적 통증 신호 해독표 ━━━ */
`<div class="stitle sp">📡 보편적 통증 신호 해독표 — 모든 견종 공통</div>
<div style="display:flex;flex-direction:column;gap:2px">
  <div class="sig-row"><div class="sig-b r"></div><div class="sig-txt"><strong>갑자기 주저앉음 / 뒷다리 힘 빠짐</strong><div class="sig-mean">24시간 안에 병원. 척수 압박 전조 가능성 높음. 기다리지 마세요.</div></div></div>
  <div class="sig-row"><div class="sig-b r"></div><div class="sig-txt"><strong>소변·대변 실수 (갑작스럽게)</strong><div class="sig-mean">척수 신경 손상이 방광·장 기능에 영향. 응급 수준입니다.</div></div></div>
  <div class="sig-row"><div class="sig-b o"></div><div class="sig-txt"><strong>한쪽 다리를 들고 걷는다</strong><div class="sig-mean">관절 통증 회피 or 신경 이상 초기. 3일 이상 지속 시 내원.</div></div></div>
  <div class="sig-row"><div class="sig-b o"></div><div class="sig-txt"><strong>계단·소파를 갑자기 주저한다</strong><div class="sig-mean">통증으로 체중 싣기를 피하는 행동. 자발적 회피입니다.</div></div></div>
  <div class="sig-row"><div class="sig-b o"></div><div class="sig-txt"><strong>안기거나 만지는 걸 피한다</strong><div class="sig-mean">통증 부위 보호 반응. 평소와 다르다면 신호입니다.</div></div></div>
  <div class="sig-row"><div class="sig-b y"></div><div class="sig-txt"><strong>산책 후 유독 오래 잔다</strong><div class="sig-mean">회복에 에너지 집중. 근육·관절 피로 축적 신호.</div></div></div>
  <div class="sig-row"><div class="sig-b y"></div><div class="sig-txt"><strong>앉았다 일어날 때 천천히 한다</strong><div class="sig-mean">기동 시 통증. 노령견 퇴행성 관절염 전형적 패턴.</div></div></div>
  <div class="sig-row"><div class="sig-b y"></div><div class="sig-txt"><strong>걸음걸이가 살짝 어색해졌다</strong><div class="sig-mean">뒷발이 앞발 자리에 정확히 안 닿으면 신경 전달 확인 필요.</div></div></div>

let cur=0,busy=false;
const total=pages.length;
const FULL=['cover','ep'];
function isFullPage(h){return FULL.some(c=>h.includes('class="'+c))}
function render(){
  const h=pages[cur];
  const pc=document.getElementById('pc');
  pc.innerHTML=h;
  pc.className=isFullPage(h)?'pc full':'pc';
  pc.scrollTop=0;
  document.getElementById('pnum').textContent=(cur===0||cur===total-1)?'':cur;
  document.getElementById('pcnt').textContent=`${cur+1} / ${total}`;
  document.getElementById('pfill').style.width=`${((cur+1)/total)*100}%`;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===total-1;
}
function go(idx,dir){
  if(busy||idx<0||idx>=total)return;
  busy=true;
  const pg=document.getElementById('page');
  const oc=dir==='next'?'fo':'fol',ic=dir==='next'?'fi':'fil';
  pg.classList.add(oc);
  setTimeout(()=>{
    pg.classList.remove(oc);cur=idx;render();
    pg.classList.add(ic);
    setTimeout(()=>{pg.classList.remove(ic);busy=false},280);
  },280);
}
function next(){go(cur+1,'next')}
function prev(){go(cur-1,'prev')}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
let tx=0;
const pg=document.getElementById('page');
pg.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
pg.addEventListener('touchend',e=>{
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){d>0?next():prev();}
},{passive:true});
let wt=0;
document.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)<40)return;
  const pc=document.getElementById('pc');
  const sc=pc.scrollHeight>pc.clientHeight+10;
  if(sc){
    if(e.deltaY>0&&pc.scrollTop+pc.clientHeight<pc.scrollHeight-4)return;
    if(e.deltaY<0&&pc.scrollTop>0)return;
  }
  const now=Date.now();
  if(now-wt<400)return;
  wt=now;
  e.deltaY>0?next():prev();
},{passive:true});
render();

function scaleBook(){
  const wrap=document.querySelector('.wrap');
  const totalW=720+62*2+20;
  const totalH=520+60+40;
  const scaleW=window.innerWidth/totalW;
  const scaleH=window.innerHeight/totalH;
  const scale=Math.min(1,scaleW,scaleH);
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='top center';
  document.body.style.alignItems='flex-start';
  document.body.style.paddingTop=`${Math.max(10,(window.innerHeight-totalH*scale)/2)}px`;
}
scaleBook();
window.addEventListener('resize',scaleBook);
</script>
</body>
