<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견종별 건강가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1a2e;background-image:radial-gradient(ellipse at 30% 50%,#0a1628,transparent 60%),radial-gradient(ellipse at 70% 50%,#050d1a,transparent 60%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif KR',Georgia,serif;padding:20px;user-select:none;}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.book-outer{position:relative;width:720px;height:520px}
.book-shadow{position:absolute;bottom:-18px;left:15%;width:70%;height:30px;background:rgba(0,0,0,0.5);filter:blur(18px);border-radius:50%}
.page{width:720px;height:520px;background:#fdf6e3;border-radius:3px 10px 10px 3px;box-shadow:-3px 0 6px rgba(0,0,0,0.2),8px 8px 24px rgba(0,0,0,0.5),18px 18px 40px rgba(0,0,0,0.3),inset -4px 0 12px rgba(0,0,0,0.06);overflow:hidden;position:relative;transform-origin:left center;}
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,rgba(0,0,0,0.18) 0%,rgba(0,0,0,0.06) 50%,transparent 100%);z-index:20;pointer-events:none}
.page::after{content:'';position:absolute;right:0;top:0;bottom:0;width:16px;background:linear-gradient(to left,rgba(0,0,0,0.07),transparent);z-index:20;pointer-events:none}
.pc{padding:48px 64px 48px 72px;height:100%;overflow-y:auto;scrollbar-width:none}
.pc::-webkit-scrollbar{display:none}
.pc.full{padding:0}
@keyframes fOut{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}}
@keyframes fIn{0%{transform:perspective(1400px) rotateY(18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
@keyframes fOutL{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(18deg);opacity:.4}}
@keyframes fInL{0%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
.fo{animation:fOut .28s ease forwards}.fi{animation:fIn .28s ease forwards}.fol{animation:fOutL .28s ease forwards}.fil{animation:fInL .28s ease forwards}
.pnum{position:absolute;bottom:18px;right:28px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#3a7bd5;z-index:30}
.prog{width:720px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(to right,#1a5fa8,#4aa3f0);border-radius:2px;transition:width .4s ease}
.nav{display:flex;align-items:center;gap:20px}
.nbtn{background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.78);padding:10px 26px;border-radius:24px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;transition:all .2s;backdrop-filter:blur(8px);}
.nbtn:hover:not(:disabled){background:rgba(255,255,255,0.18);color:#fff}
.nbtn:disabled{opacity:.28;cursor:not-allowed}
.pcnt{color:rgba(255,255,255,0.5);font-family:'Noto Sans KR',sans-serif;font-size:12px;min-width:70px;text-align:center}
.hint{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,0.22);text-align:center}
.cover{background:linear-gradient(150deg,#061020 0%,#0d2340 45%,#061020 100%);color:#e8f0fb;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;padding:44px 36px}
.cover h1{font-size:32px;font-weight:700;line-height:1.5;color:#fff}
.cover-line{width:48px;height:1px;background:#4aa3f0;margin:16px auto}
.ctp{background:linear-gradient(135deg,#f0f5fd,#fdf6e3);display:flex;flex-direction:column;justify-content:center;padding:56px 70px;height:100%}
.cnum{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;color:#1a5fa8;margin-bottom:16px}
.ctitle{font-size:28px;font-weight:700;color:#1a1a1a;line-height:1.5;margin-bottom:20px}
.cline{width:44px;height:3px;background:#1a5fa8;margin-bottom:24px}
.cintro{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#555;line-height:2}
.stitle{font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #b8d0f0}
.bt{font-family:'Noto Sans KR',sans-serif;font-size:13.5px;color:#3a3a3a;line-height:2.05;margin-bottom:14px}
.hb{background:#eef4fd;border-left:4px solid #1a5fa8;padding:14px 18px;margin:16px 0;border-radius:0 8px 8px 0}
.hb p{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#0d2a55;line-height:1.95;font-weight:500}
.kp{background:#f0f7ff;border:1px solid #b8d0f0;border-radius:8px;padding:14px 18px;margin:14px 0}
.kpt{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;color:#1a5fa8;letter-spacing:2px;margin-bottom:7px}
.kp p{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#1a3060;line-height:1.85}
.sh{font-size:14px;font-weight:600;color:#1a5fa8;margin:16px 0 8px}
ul.cl{list-style:none;padding:0;margin:8px 0}
ul.cl li{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#3a3a3a;line-height:1.95;padding-left:18px;position:relative;margin-bottom:4px}
ul.cl li::before{content:'•';position:absolute;left:0;color:#1a5fa8;font-weight:bold}
table.ct{width:100%;border-collapse:collapse;margin:14px 0;font-family:'Noto Sans KR',sans-serif;font-size:12.5px}
table.ct th{background:#1a5fa8;color:#fff;padding:9px 12px;text-align:left;font-weight:600}
table.ct td{padding:9px 12px;border-bottom:1px solid #b8d0f0;color:#3a3a3a;line-height:1.6}
table.ct tr:nth-child(even) td{background:#f0f5fd}
.toc-i{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #d0e4f8}
.toc-cn{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;color:#1a5fa8;width:44px;flex-shrink:0}
.toc-t{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:#2a2a2a;flex:1}
.toc-d{flex:1;border-bottom:1px dotted #b0c8e8;margin:0 10px;height:10px;max-width:120px}
.toc-p{font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#1a5fa8}
.ep{background:linear-gradient(140deg,#061020,#0d2340);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;color:#fff;padding:56px}
.ep h2{font-size:26px;line-height:1.55;margin-bottom:18px}
.ep p{font-family:'Noto Sans KR',sans-serif;font-size:14px;color:rgba(255,255,255,0.75);line-height:2.1}
.ep-line{width:50px;height:2px;background:#4aa3f0;margin:18px auto}
.toc-link:hover{background:#e8f2fc;border-radius:8px;transition:background 0.2s;}
.toc-sub{padding:4px 8px 4px 20px;font-size:12px;color:#555;border-left:2px solid #b8d0f0;margin:2px 0 2px 14px;cursor:pointer;border-radius:0 6px 6px 0;transition:background 0.15s}
.toc-sub:hover{background:#e8f2fc}
.side-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:40;width:52px;height:80px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);font-size:28px;cursor:pointer;transition:all .2s;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;line-height:1;font-family:sans-serif;}
.side-btn:hover:not(:disabled){background:rgba(255,255,255,0.22);color:#fff;transform:translateY(-50%) scale(1.07);}
.side-btn:disabled{opacity:.15;cursor:not-allowed;transform:translateY(-50%);}
.side-prev{left:-62px;border-radius:10px 0 0 10px;}
.side-next{right:-62px;border-radius:0 10px 10px 0;}
.badge-r{display:inline-block;background:#c0392b;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:4px}
.badge-o{display:inline-block;background:#e67e22;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:4px}
.badge-y{display:inline-block;background:#f1c40f;color:#333;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-right:4px}
.sig-row{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid #e8f0f8;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:1.6}
.sig-b{flex:0 0 auto;width:9px;height:9px;border-radius:50%;margin-top:4px}
.sig-b.r{background:#c0392b}
.sig-b.o{background:#e67e22}
.sig-b.y{background:#f1c40f}
.sig-txt{flex:1}
.sig-mean{color:#888;font-size:11px;margin-top:2px}
.dog-header{display:flex;align-items:center;gap:12px;padding:10px 14px;background:linear-gradient(135deg,#e8f2fc,#f0f7ff);border-radius:10px;margin-bottom:14px;border:1px solid #b8d0f0}
.dog-icon{font-size:28px}
.dog-name{font-size:17px;font-weight:700;color:#0d2340}
.dog-sub{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#555;margin-top:2px}
.dog-role{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#1a5fa8;font-weight:700;margin-top:4px;letter-spacing:1px}
</style>
</head>
<body>
<div class="wrap">
  <div class="book-outer">
    <div class="book-shadow"></div>
    <button class="side-btn side-prev" id="pb" onclick="prev()">‹</button>
    <button class="side-btn side-next" id="nb" onclick="next()">›</button>
    <div class="page" id="page">
      <div class="pc" id="pc"></div>
      <div class="pnum" id="pnum"></div>
    </div>

</div>
<script>
const pages=[

/* ── 표지 ── */
`<div class="cover">
  <p style="font-size:11px;color:#4aa3f0;letter-spacing:3px;font-weight:700;margin-bottom:16px">🌸 2026 봄 수의사 긴급 가이드</p>

  </div>
  <h1 style="font-size:30px;font-weight:800;line-height:1.5;color:#fff;margin-bottom:6px">견종별 건강가이드</h1>
  <div class="cover-line"></div>
  <p style="font-size:12px;color:#90b8e0;line-height:2;margin-bottom:22px">봄 산책 후 갑자기 보이는 그 행동의 진짜 의미<br>견종별·페르소나별 맞춤 진단 &amp; 케어</p>
  <div style="display:flex;gap:18px;justify-content:center;margin-bottom:8px">
    <div style="text-align:center"><div style="font-size:20px">🏥</div><div style="font-size:10px;color:#6090c0;margin-top:4px">케이스 5,000건+</div></div>
    <div style="text-align:center"><div style="font-size:20px">📍</div><div style="font-size:10px;color:#6090c0;margin-top:4px">16년 통합의학</div></div>
    <div style="text-align:center"><div style="font-size:20px">📅</div><div style="font-size:10px;color:#6090c0;margin-top:4px">2026 최신 가이드</div></div>
  </div>
  <p style="font-size:11px;color:#4a7090;margin-top:10px;letter-spacing:1px">🐾 하나로 양한방동물병원</p>
</div>`,

/* ── 머리말 ── */
`<div style="padding:4px 2px;display:flex;flex-direction:column;height:100%">
<div class="stitle" style="margin-bottom:14px">머리말</div>
<div style="flex:1;display:flex;flex-direction:column;gap:12px">
  <div style="text-align:center;margin-bottom:2px">
    <p style="font-size:15px;font-weight:800;color:#0d2340;line-height:1.8;margin:0">봄 산책 후 달라진 우리 아이,<br>왜 갑자기 그럴까요?</p>
  </div>
  <div class="hb" style="padding:12px 16px">
    <p style="font-size:13.5px;line-height:2;font-style:italic;color:#0d2340;margin:0">"신호가 없어서 놓치는 것이 아닙니다.<br>신호를 읽는 법을 몰라서입니다."</p>
  </div>
  <p class="bt">매년 봄마다 병원으로 전화를 주시는 보호자분들이 있습니다. 어제까지 멀쩡하던 아이가 오늘 갑자기 다리를 들고, 계단을 주저하고, 눈빛이 달라졌다고 하십니다.</p>
  <div class="kp">
    <div class="kpt">이 가이드에 담은 것</div>
    <p>5,000건 이상의 임상 케이스에서 뽑아낸<br>봄철 가장 중요한 이야기들입니다.<br><br>견종마다 통증을 표현하는 방식이 다르고,<br>나이마다 보내는 신호가 다릅니다.<br>이 책이 그 차이를 읽어드립니다.</p>
  </div>
  <p class="bt" style="color:#555">우리 병원에 오든 오지 않든, 이 봄을 우리 아이들이 안전하게 보내길 바라는 마음이 먼저였습니다.</p>
  <p style="text-align:right;font-size:12px;color:#888;margin-top:auto">— 하나로양한방동물병원 원장</p>
</div>
</div>`,

/* ── 목차 ── */
`<div class="stitle">목 차</div>
<div style="font-size:11px;color:#aaa;margin-bottom:12px;text-align:center">항목을 누르면 해당 페이지로 이동합니다</div>

<div class="toc-i toc-link" onclick="go(3,'next')" style="cursor:pointer"><span class="toc-cn">1장</span><span class="toc-t">봄철 근골격 위기의 원리</span><span class="toc-d"></span></div>
<div class="toc-sub" onclick="go(4,'next')">왜 하필 봄인가</div>
<div class="toc-sub" onclick="go(5,'next')">보편적 통증 신호 해독표</div>

<div class="toc-i toc-link" onclick="go(6,'next')" style="cursor:pointer;margin-top:6px"><span class="toc-cn">2장</span><span class="toc-t">닥스훈트 — 척추를 지키는 케어</span><span class="toc-d"></span></div>
<div class="toc-sub" onclick="go(7,'next')">🐾 멜리 (9세) — 초기 증상 발견형</div>
<div class="toc-sub" onclick="go(9,'next')">🐾 조이 (6세) — 재활 진행형 홈케어</div>
<div class="toc-sub" onclick="go(11,'next')">🐾 볼트 (13세) — 노령견 고위험군</div>

<div class="toc-i toc-link" onclick="go(13,'next')" style="cursor:pointer;margin-top:6px"><span class="toc-cn">3장</span><span class="toc-t">소형견 맞춤 케어 가이드</span><span class="toc-d"></span></div>
<div class="toc-sub" onclick="go(14,'next')">🐾 딱지 (요크셔테리어 17세)</div>
<div class="toc-sub" onclick="go(16,'next')">🐾 제이 (비글 10세)</div>
<div class="toc-sub" onclick="go(18,'next')">🐾 봄이 (말티즈 6세)</div>

<div class="toc-i toc-link" onclick="go(20,'next')" style="cursor:pointer;margin-top:6px"><span class="toc-cn">4장</span><span class="toc-t">자주 묻는 질문 5가지</span><span class="toc-d"></span></div>
<div class="toc-sub" onclick="go(21,'next')">Q1~Q3 — 쉬면 낫나요? 비용은? 수술 없이?</div>
<div class="toc-sub" onclick="go(22,'next')">Q4~Q5 — 나이 많은데? 수술하면 완치?</div>
<div class="toc-sub" onclick="go(23,'next')">마치며</div>`,

/* ── Chapter 1 인트로 ── */
`<div class="ctp"><div class="cnum">CHAPTER 1</div><div class="ctitle">봄철<br>근골격 위기의<br>원리</div><div class="cline"></div><div class="cintro">겨울 동안 조용히 약해진 근육이<br>봄 산책의 부하를 버티지 못합니다.<br><br>보호자가 어떻게 반응하느냐에 따라<br>2~4주 후의 결과가 완전히 달라집니다.</div></div>`,

/* ── 왜 봄인가 ── */
`<div class="stitle">왜 하필 봄인가</div>
<p class="bt">겨울 동안 실내에서 지내던 강아지의 근육은 조용히 약해집니다. 그런데 봄이 되면 어떻게 되나요?</p>
<div class="hb" style="margin-bottom:14px"><p style="font-size:13px;line-height:2">보호자도 신나고, 강아지도 신납니다. 갑자기 산책이 길어집니다. 공원을 뛰어다닙니다. 그리고 — 다음 날 아침, <strong>무언가가 달라져 있습니다.</strong></p></div>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
  <div style="background:#f0f5fd;border-left:3px solid #1a5fa8;padding:9px 12px;border-radius:0 8px 8px 0">
    <div style="font-size:11px;color:#888;margin-bottom:2px">원인</div>
    <div style="font-size:13px;font-weight:700;color:#0d2340">겨우내 약해진 근육</div>
    <div style="font-size:11px;color:#555;margin-top:3px">→ 갑작스러운 운동 부하를 버티지 못합니다</div>
  </div>
  <div style="background:#fff0f0;border-left:3px solid #c0392b;padding:9px 12px;border-radius:0 8px 8px 0">
    <div style="font-size:11px;color:#888;margin-bottom:2px">위험</div>
    <div style="font-size:13px;font-weight:700;color:#7d1a1a">골든타임을 놓치는 이유</div>
    <div style="font-size:11px;color:#555;margin-top:3px">→ "하루만 더 보자"가 가장 흔한 실수입니다</div>
  </div>
</div>
<div class="kp"><div class="kpt">저는 이것을 '봄철 근골격 충격'이라 부릅니다</div><p>강아지는 말을 못 합니다. 대신 <strong>몸으로 말합니다.</strong><br>견종마다 통증을 표현하는 방식이 다르고,<br>나이마다 보내는 신호가 다릅니다.</p></div>`,

/* ── 보편적 통증 신호 해독표 ── */
`<div class="stitle">보편적 통증 신호 해독표</div>
<div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#888;margin-bottom:10px">모든 견종 공통 — 강아지의 행동이 말하는 것</div>
<div style="display:flex;flex-direction:column;gap:2px">

let cur=0,busy=false;
const total=pages.length;
const FULL=['cover','ctp','ep'];
function isFullPage(html){return FULL.some(c=>html.includes('class="'+c+'"'))}
function render(){
  const html=pages[cur];
  const pc=document.getElementById('pc');
  pc.innerHTML=html;
  pc.className=isFullPage(html)?'pc full':'pc';
  pc.scrollTop=0;
  document.getElementById('pnum').textContent=(cur===0||cur===total-1)?'':cur;
  document.getElementById('pcnt').textContent=`${cur+1} / ${total}`;
  document.getElementById('pfill').style.width=`${((cur+1)/total)*100}%`;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===total-1;
}
function go(idx,dir){
  if(busy||idx<0||idx>=total)return;
  busy=true;
  const pg=document.getElementById('page');
  const outC=dir==='next'?'fo':'fol';
  const inC=dir==='next'?'fi':'fil';
  pg.classList.add(outC);
  setTimeout(()=>{
    pg.classList.remove(outC);cur=idx;render();
    pg.classList.add(inC);
    setTimeout(()=>{pg.classList.remove(inC);busy=false},280);
  },280);
}
function next(){go(cur+1,'next')}
function prev(){go(cur-1,'prev')}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
let tx=0;
const pg=document.getElementById('page');
pg.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
pg.addEventListener('touchend',e=>{
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){d>0?next():prev();}
},{passive:true});
let wt=0;
document.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)<40)return;
  const pc=document.getElementById('pc');
  const scrollable=pc.scrollHeight>pc.clientHeight+10;
  if(scrollable){
    const atBottom=pc.scrollTop+pc.clientHeight>=pc.scrollHeight-4;
    const atTop=pc.scrollTop<=0;
    if(e.deltaY>0&&!atBottom)return;
    if(e.deltaY<0&&!atTop)return;
  }
  const now=Date.now();
  if(now-wt<400)return;
  wt=now;
  if(e.deltaY>0)next();
  else if(e.deltaY<0)prev();
},{passive:true});
render();
</script>
</body>
</html>
