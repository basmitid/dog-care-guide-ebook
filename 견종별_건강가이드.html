<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견종별 건강가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1a2e;background-image:radial-gradient(ellipse at 30% 50%,#0a1628,transparent 60%),radial-gradient(ellipse at 70% 50%,#050d1a,transparent 60%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Noto Serif KR',Georgia,serif;padding:20px;user-select:none}
.wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.book-outer{position:relative;width:720px;height:520px}
.book-shadow{position:absolute;bottom:-18px;left:15%;width:70%;height:30px;background:rgba(0,0,0,.5);filter:blur(18px);border-radius:50%}
.page{width:720px;height:520px;background:#fdf6e3;border-radius:3px 10px 10px 3px;box-shadow:-3px 0 6px rgba(0,0,0,.2),8px 8px 24px rgba(0,0,0,.5),18px 18px 40px rgba(0,0,0,.3),inset -4px 0 12px rgba(0,0,0,.06);overflow:hidden;position:relative;transform-origin:left center}
.page::before{content:'';position:absolute;left:0;top:0;bottom:0;width:48px;background:linear-gradient(to right,rgba(0,0,0,.18) 0%,rgba(0,0,0,.06) 50%,transparent 100%);z-index:20;pointer-events:none}
.page::after{content:'';position:absolute;right:0;top:0;bottom:0;width:16px;background:linear-gradient(to left,rgba(0,0,0,.07),transparent);z-index:20;pointer-events:none}
.pc{padding:44px 60px 44px 72px;height:100%;overflow-y:auto;scrollbar-width:none}
.pc::-webkit-scrollbar{display:none}
.pc.full{padding:0}
@keyframes fOut{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}}
@keyframes fIn{0%{transform:perspective(1400px) rotateY(18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
@keyframes fOutL{0%{transform:perspective(1400px) rotateY(0)}100%{transform:perspective(1400px) rotateY(18deg);opacity:.4}}
@keyframes fInL{0%{transform:perspective(1400px) rotateY(-18deg);opacity:.4}100%{transform:perspective(1400px) rotateY(0)}}
.fo{animation:fOut .28s ease forwards}.fi{animation:fIn .28s ease forwards}.fol{animation:fOutL .28s ease forwards}.fil{animation:fInL .28s ease forwards}
.pnum{position:absolute;bottom:16px;right:26px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#3a7bd5;z-index:30}
.prog{width:720px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(to right,#1a5fa8,#4aa3f0);border-radius:2px;transition:width .4s ease}
.pcnt{color:rgba(255,255,255,.5);font-family:'Noto Sans KR',sans-serif;font-size:12px;min-width:70px;text-align:center}
.hint{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:rgba(255,255,255,.22);text-align:center}
/* 공통 컴포넌트 */
.cover{background:linear-gradient(150deg,#061020 0%,#0d2340 45%,#061020 100%);color:#e8f0fb;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;padding:44px 36px}
.cover-line{width:48px;height:1px;background:#4aa3f0;margin:14px auto}
.ctp{display:flex;flex-direction:column;justify-content:center;padding:52px 70px;height:100%}
.ctp.small{background:linear-gradient(135deg,#f0f8f0,#fdf6e3)}
.ctp.medium{background:linear-gradient(135deg,#e0f2f1,#fdf6e3)}
.ctp.special{background:linear-gradient(135deg,#f8f0f8,#fdf6e3)}
.ctp.large{background:linear-gradient(135deg,#f0f4f8,#fdf6e3)}
.cnum{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;margin-bottom:14px}
.cnum.small{color:#2e7d32}
.cnum.medium{color:#00695c}
.cnum.special{color:#6a1b9a}
.cnum.large{color:#1565c0}
.ctitle{font-size:27px;font-weight:700;color:#1a1a1a;line-height:1.55;margin-bottom:18px}
.cline{width:44px;height:3px;margin-bottom:22px}
.cline.small{background:#2e7d32}
.cline.medium{background:#00695c}
.cline.special{background:#6a1b9a}
.cline.large{background:#1565c0}
.cintro{font-family:'Noto Sans KR',sans-serif;font-size:13.5px;color:#555;line-height:2}
.stitle{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:14px;padding-bottom:9px;border-bottom:2px solid #b8d0f0}
.stitle.small{border-bottom-color:#a5d6a7}
.stitle.medium{border-bottom-color:#80cbc4}
.stitle.special{border-bottom-color:#ce93d8}
.stitle.large{border-bottom-color:#90caf9}
.bt{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#3a3a3a;line-height:2;margin-bottom:12px}
.hb{border-left:4px solid #1a5fa8;padding:12px 16px;margin:12px 0;border-radius:0 8px 8px 0}
.hb.small{background:#f1f8f1;border-left-color:#2e7d32}.hb.small p{color:#1b4f1e}
.hb.medium{background:#e0f2f1;border-left-color:#00695c}.hb.medium p{color:#003d33}
.hb.special{background:#f8f0fc;border-left-color:#6a1b9a}.hb.special p{color:#3d0070}
.hb.large{background:#e8f4fd;border-left-color:#1565c0}.hb.large p{color:#0d2a55}
.hb p{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;line-height:1.9;font-weight:500;margin:0}
.kp{border:1px solid;border-radius:8px;padding:12px 16px;margin:12px 0}
.kp.small{background:#f1f8f1;border-color:#a5d6a7}
.kp.medium{background:#e0f2f1;border-color:#80cbc4}
.kp.special{background:#f8f0fc;border-color:#ce93d8}
.kp.large{background:#e8f4fd;border-color:#90caf9}
.kpt{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.kpt.small{color:#2e7d32}.kpt.medium{color:#00695c}.kpt.special{color:#6a1b9a}.kpt.large{color:#1565c0}
.kp p{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;color:#1a1a1a;line-height:1.85}
.sh{font-size:13px;font-weight:700;margin:12px 0 6px}
.sh.small{color:#2e7d32}.sh.medium{color:#00695c}.sh.special{color:#6a1b9a}.sh.large{color:#1565c0}
ul.cl{list-style:none;padding:0;margin:6px 0}
ul.cl li{font-family:'Noto Sans KR',sans-serif;font-size:12.5px;color:#3a3a3a;line-height:1.9;padding-left:16px;position:relative;margin-bottom:3px}
ul.cl li::before{content:'•';position:absolute;left:0;font-weight:bold}
ul.cl.small li::before{color:#2e7d32}
ul.cl.medium li::before{color:#00695c}
ul.cl.special li::before{color:#6a1b9a}
ul.cl.large li::before{color:#1565c0}
table.ct{width:100%;border-collapse:collapse;margin:10px 0;font-family:'Noto Sans KR',sans-serif;font-size:12px}
table.ct th{color:#fff;padding:8px 10px;text-align:left;font-weight:600}
table.ct.small th{background:#2e7d32}
table.ct.medium th{background:#00695c}
table.ct.special th{background:#6a1b9a}
table.ct.large th{background:#1565c0}
table.ct td{padding:8px 10px;border-bottom:1px solid #e0e0e0;color:#3a3a3a;line-height:1.55}
table.ct.small tr:nth-child(even) td{background:#f1f8f1}
table.ct.medium tr:nth-child(even) td{background:#e0f2f1}
table.ct.special tr:nth-child(even) td{background:#f8f0fc}
table.ct.large tr:nth-child(even) td{background:#e8f4fd}
/* 목차 */
.toc-i{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #e0e8f0;cursor:pointer}
.toc-i:hover{background:#f0f5fd;border-radius:6px}
.toc-cn{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;width:42px;flex-shrink:0}
.toc-cn.small{color:#2e7d32}.toc-cn.medium{color:#00695c}.toc-cn.special{color:#6a1b9a}.toc-cn.large{color:#1565c0}
.toc-t{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#2a2a2a;flex:1}
.toc-sub{padding:3px 8px 3px 20px;font-size:11.5px;color:#555;border-left:2px solid #d0dce8;margin:1px 0 1px 14px;cursor:pointer;border-radius:0 5px 5px 0;transition:background .15s}
.toc-sub:hover{background:#f0f5fd}
/* 견종 헤더 */
.dog-hd{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:12px;border:1px solid}
.dog-hd.small{background:linear-gradient(135deg,#e8f5e9,#f1f8f1);border-color:#a5d6a7}
.dog-hd.medium{background:linear-gradient(135deg,#e0f2f1,#e8f5e9);border-color:#80cbc4}
.dog-hd.special{background:linear-gradient(135deg,#f3e5f5,#f8f0fc);border-color:#ce93d8}
.dog-hd.large{background:linear-gradient(135deg,#e3f2fd,#e8f4fd);border-color:#90caf9}
.dog-icon{font-size:26px}
.dog-name{font-size:16px;font-weight:700;color:#1a1a1a}
.dog-sub{font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#555;margin-top:2px}
.dog-tag{font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:700;margin-top:4px;letter-spacing:.5px}
.dog-tag.small{color:#2e7d32}.dog-tag.medium{color:#00695c}.dog-tag.special{color:#6a1b9a}.dog-tag.large{color:#1565c0}
/* 신호 행 */
.sig-row{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-bottom:1px solid #efefef;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#3a3a3a;line-height:1.5}
.sig-b{flex:0 0 8px;height:8px;border-radius:50%;margin-top:4px}
.sig-b.r{background:#c0392b}.sig-b.o{background:#e67e22}.sig-b.y{background:#f1c40f}
.sig-txt{flex:1}
.sig-mean{color:#888;font-size:11px;margin-top:1px}
/* 엔딩 */
.ep{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:100%;color:#fff;padding:56px;background:linear-gradient(140deg,#061020,#0d2340)}
.ep h2{font-size:24px;line-height:1.6;margin-bottom:16px}
.ep p{font-family:'Noto Sans KR',sans-serif;font-size:13px;color:rgba(255,255,255,.75);line-height:2.1}
.ep-line{width:50px;height:2px;background:#4aa3f0;margin:16px auto}
/* 사이드 버튼 */
.side-btn{position:absolute;top:50%;transform:translateY(-50%);z-index:40;width:52px;height:80px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.65);font-size:28px;cursor:pointer;transition:all .2s;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-family:sans-serif}
.side-btn:hover:not(:disabled){background:rgba(255,255,255,.22);color:#fff;transform:translateY(-50%) scale(1.07)}
.side-btn:disabled{opacity:.15;cursor:not-allowed;transform:translateY(-50%)}
.side-prev{left:-62px;border-radius:10px 0 0 10px}
.side-next{right:-62px;border-radius:0 10px 10px 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="book-outer">
    <div class="book-shadow"></div>
    <button class="side-btn side-prev" id="pb" onclick="prev()">‹</button>
    <button class="side-btn side-next" id="nb" onclick="next()">›</button>
    <div class="page" id="page"><div class="pc" id="pc"></div><div class="pnum" id="pnum"></div></div>
  </div>
  <div class="prog"><div class="pfill" id="pfill"></div></div>
  <span class="pcnt" id="pcnt"></span>
  <div class="hint">← → 키 · 양옆 버튼 · 스와이프로 넘기세요</div>
</div>
<script>
const pages=[

/* ━━━ 0. 표지 ━━━ */
`<div class="cover">
  <p style="font-size:11px;color:#4aa3f0;letter-spacing:3px;font-weight:700;margin-bottom:16px">🏥 하나로양한방동물병원</p>
  <div style="background:rgba(74,163,240,.12);border:1px solid rgba(74,163,240,.3);border-radius:12px;padding:14px 22px;margin-bottom:22px">
    <p style="font-size:13px;line-height:2;color:#c8dff8;margin:0;font-style:italic">"우리 아이의 건강 약점은<br>견종마다 다릅니다."</p>
  </div>
  <h1 style="font-size:30px;font-weight:800;line-height:1.5;color:#fff;margin-bottom:6px">견종별 건강가이드</h1>
  <div class="cover-line"></div>
  <p style="font-size:12px;color:#90b8e0;line-height:2.1;margin-bottom:22px">소형견 · 중형견 · 특수 체형견 · 대형견<br>견종별 취약 질환과 평생 관리법</p>
  <div style="display:flex;gap:16px;justify-content:center">
    <div style="text-align:center"><div style="font-size:18px">🐩</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#5080a0;margin-top:4px">소형견 8종</div></div>
    <div style="text-align:center"><div style="font-size:18px">🐕‍🦺</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#5080a0;margin-top:4px">중형견 3종</div></div>
    <div style="text-align:center"><div style="font-size:18px">🦴</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#5080a0;margin-top:4px">특수체형 3종</div></div>
    <div style="text-align:center"><div style="font-size:18px">🐕</div><div style="font-family:'Noto Sans KR',sans-serif;font-size:10px;color:#5080a0;margin-top:4px">대형견 1종</div></div>
  </div>
</div>`,

/* ━━━ 1. 머리말 ━━━ */
`<div style="height:100%;display:flex;flex-direction:column">
<div class="stitle" style="border-bottom-color:#b8d0f0">머리말</div>
<div style="flex:1;display:flex;flex-direction:column;gap:11px">
  <div style="text-align:center;padding:8px 0">
    <p style="font-size:14px;font-weight:800;color:#0d2340;line-height:1.9;margin:0">같은 견종이라도 모든 아이가<br>똑같은 병에 걸리는 것은 아닙니다.</p>
  </div>
  <div class="hb large"><p>"하지만 견종마다 유독 취약한 부분이 있습니다.<br>그 특징을 미리 알면, 문제가 생기기 전에 관리하고<br>조금 더 일찍 발견할 수 있습니다."</p></div>
  <p class="bt">임상 현장에서 5,000건 이상의 케이스를 보면서 느낀 것이 있습니다. 같은 증상이라도 어떤 견종이냐에 따라 의심해야 할 원인이 달라지고, 같은 견종이라도 관리 방법에 따라 발병 시기와 진행 속도가 크게 달라진다는 사실입니다.</p>
  <p class="bt" style="margin-top:-6px">이 책은 특정 병이 반드시 온다고 말하는 것이 아닙니다. 우리 아이가 어떤 부분에 조금 더 주의가 필요한지, 어떤 신호를 놓치지 말아야 하는지를 미리 알아두시길 바라는 마음으로 썼습니다.</p>
  <div class="kp large">
    <div class="kpt large">이 책에 담은 것</div>
    <p>소형견 8종 · 중형견 3종 · 특수 체형견 3종 · 대형견 1종<br>총 15개 견종의 <strong>취약 부위, 조기 신호, 평생 관리 포인트</strong>를 담았습니다.<br><br>아프기 전에 읽어두시길 권합니다.</p>
  </div>
  <p style="text-align:right;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:#888;margin-top:auto">— 하나로양한방동물병원 원장</p>
</div>
</div>`,

/* ━━━ 2. 목차 ━━━ */
`<div class="stitle" style="border-bottom-color:#b8d0f0">목 차</div>
<div style="font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#aaa;margin-bottom:8px;text-align:center">항목을 누르면 해당 페이지로 이동합니다</div>

<div class="toc-i" onclick="go(3,'next')"><span class="toc-cn small">1장</span><span class="toc-t">🐩 소형견 건강가이드 (8종)</span></div>
<div class="toc-sub" onclick="go(4,'next')">말티즈 — 슬개골 · 기관허탈</div>
<div class="toc-sub" onclick="go(5,'next')">토이 푸들 — 슬개골 · 유전 눈 질환</div>
<div class="toc-sub" onclick="go(6,'next')">치와와 — 심장 · 수두증</div>
<div class="toc-sub" onclick="go(7,'next')">시츄 — 안구 · 피부 · 호흡기</div>
<div class="toc-sub" onclick="go(8,'next')">포메라니안 — 탈모증 · 기관허탈</div>
<div class="toc-sub" onclick="go(9,'next')">요크셔테리어 — 간문맥단락 · 치아</div>
<div class="toc-sub" onclick="go(10,'next')">비숑 프리제 — 알레르기 · 방광결석</div>
<div class="toc-sub" onclick="go(11,'next')">미니어처 슈나우저 — 고지혈증 · 췌장염</div>

<div class="toc-i" onclick="go(12,'next')" style="margin-top:4px"><span class="toc-cn medium">2장</span><span class="toc-t">🐕‍🦺 중형견 건강가이드 (3종)</span></div>
<div class="toc-sub" onclick="go(13,'next')">비글 — 비만 · 외이염 · 간질</div>
<div class="toc-sub" onclick="go(14,'next')">코커 스패니얼 — 외이염 · 안구 · 심장</div>
<div class="toc-sub" onclick="go(15,'next')">시바이누 — 아토피 · 녹내장</div>

<div class="toc-i" onclick="go(16,'next')" style="margin-top:4px"><span class="toc-cn special">3장</span><span class="toc-t">🦴 특수 체형견 건강가이드 (3종)</span></div>
<div class="toc-sub" onclick="go(17,'next')">닥스훈트 — 척추 IVDD</div>
<div class="toc-sub" onclick="go(18,'next')">프렌치 불독 — 호흡기 · 척추</div>
<div class="toc-sub" onclick="go(19,'next')">웰시 코기 — 척추 · 고관절</div>

<div class="toc-i" onclick="go(20,'next')" style="margin-top:4px"><span class="toc-cn large">4장</span><span class="toc-t">🐕 대형견 건강가이드 (1종)</span></div>
<div class="toc-sub" onclick="go(21,'next')">리트리버 — 고관절 · 암 · 비만</div>`,

/* ━━━ 3. Chapter 1 인트로 (소형견) ━━━ */
`<div class="ctp small">
  <div class="cnum small">CHAPTER 1</div>
  <div class="ctitle">소형견<br>건강가이드</div>
  <div class="cline small"></div>
  <div class="cintro">말티즈 · 토이 푸들 · 치와와 · 시츄<br>포메라니안 · 요크셔테리어 · 비숑 프리제 · 미니어처 슈나우저<br><br>소형견은 몸이 작은 만큼<br>관절에 가해지는 충격 비율이 높고<br>호흡기와 치아 문제가 이른 나이부터 시작됩니다.<br><br>각 견종이 특히 취약한 부분을 미리 알고<br>예방적으로 관리하는 것이 핵심입니다.</div>
</div>`,

let cur=0,busy=false;
const total=pages.length;
const FULL=['cover','ctp','ep'];
function isFullPage(h){return FULL.some(c=>h.includes('class="'+c))}
function render(){
  const h=pages[cur];
  const pc=document.getElementById('pc');
  pc.innerHTML=h;
  pc.className=isFullPage(h)?'pc full':'pc';
  pc.scrollTop=0;
  document.getElementById('pnum').textContent=(cur===0||cur===total-1)?'':cur;
  document.getElementById('pcnt').textContent=`${cur+1} / ${total}`;
  document.getElementById('pfill').style.width=`${((cur+1)/total)*100}%`;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===total-1;
}
function go(idx,dir){
  if(busy||idx<0||idx>=total)return;
  busy=true;
  const pg=document.getElementById('page');
  const oc=dir==='next'?'fo':'fol',ic=dir==='next'?'fi':'fil';
  pg.classList.add(oc);
  setTimeout(()=>{
    pg.classList.remove(oc);cur=idx;render();
    pg.classList.add(ic);
    setTimeout(()=>{pg.classList.remove(ic);busy=false},280);
  },280);
}
function next(){go(cur+1,'next')}
function prev(){go(cur-1,'prev')}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
});
let tx=0;
const pg=document.getElementById('page');
pg.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
pg.addEventListener('touchend',e=>{
  const d=tx-e.changedTouches[0].clientX;
  if(Math.abs(d)>50){d>0?next():prev();}
},{passive:true});
let wt=0;
document.addEventListener('wheel',e=>{
  if(Math.abs(e.deltaY)<40)return;
  const pc=document.getElementById('pc');
  const sc=pc.scrollHeight>pc.clientHeight+10;
  if(sc){
    if(e.deltaY>0&&pc.scrollTop+pc.clientHeight<pc.scrollHeight-4)return;
    if(e.deltaY<0&&pc.scrollTop>0)return;
  }
  const now=Date.now();
  if(now-wt<400)return;
  wt=now;
  e.deltaY>0?next():prev();
},{passive:true});
render();

function scaleBook(){
  const wrap=document.querySelector('.wrap');
  const totalW=720+62*2+20;
  const totalH=520+60+40;
  const scaleW=window.innerWidth/totalW;
  const scaleH=window.innerHeight/totalH;
  const scale=Math.min(1,scaleW,scaleH);
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='top center';
  document.body.style.alignItems='flex-start';
  document.body.style.paddingTop=`${Math.max(10,(window.innerHeight-totalH*scale)/2)}px`;
}
